<!DOCTYPE html>
<html lang="vi">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Roboto:wght@400;900&display=swap" rel="stylesheet">
    <style>
        /* Remove default body margin so the slide height equals the min-height exactly */
        body { margin: 0; }
        .slide-container {
            width: 1280px;
            min-height: 720px; /* keep as required */
            background-color: #0077B6;
            position: relative;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            color: #03045E;
        }
        .angled-block {
            position: absolute;
            top: 0;
            left: -18%;
            width: 136%;
            height: 100%;
            background-color: #FFFFFF;
            transform: rotate(-15deg);
            transform-origin: top left;
            z-index: 1;
        }
        .content {
            position: relative;
            z-index: 2;
            padding-top: 150px; /* upper padding of title must not be changed */
            padding-left: 60px; /* reduced left padding to tighten layout */
            width: 700px;
        }
        h1 {
            font-family: 'Roboto', sans-serif;
            font-weight: 900;
            font-size: 80px;
            text-transform: uppercase;
            line-height: 0.9;
            margin-bottom: 20px;
            color: #03045E;
        }
        .subtitle {
            font-size: 32px;
            font-weight: 400;
            color: #F72585;
            margin-top: 10px;
        }
        .icon-frame {
            position: absolute;
            right: 120px;
            top: 180px; /* moved slightly up so the visual balance is preserved */
            width: 240px; /* reduced size to reduce occupied vertical space */
            height: 240px;
            border: 4px solid #F72585;
            border-radius: 50%;
            overflow: hidden;
            z-index: 2;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .icon-frame img {
            width: 80%;
            height: 80%;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="angled-block"></div>
        <div class="content">
            <h1>Ứng dụng Học<br>Tiếng Trung PWA</h1>
            <div class="subtitle">Công nghệ & Tính năng tối ưu cho người bận rộn</div>
        </div>
        <div class="icon-frame">
            <img src="/home/ubuntu/learn-chinese/assets/icons/icon-512.png" alt="App Icon">
        </div>
    </div>
</body>
</html>
